<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Medicines — MedStore</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/medstore.css}" href="medstore.css">
    <style>
        .med-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 1.5rem;
        }
        .med-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }
        .med-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            border-color: var(--teal-mid);
        }
        .med-card-top {
            background: linear-gradient(135deg, var(--teal-xdark), var(--teal));
            padding: 20px 20px 16px;
        }
        .med-card-top-name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            color: white;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .med-card-top-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .med-badge-white {
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.03em;
        }
        .med-card-body {
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }
        .med-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }
        .med-price {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            color: var(--teal-dark);
        }
        .med-stock-badge {
            font-size: 12px;
            color: var(--slate-mid);
            background: var(--border-light);
            padding: 4px 10px;
            border-radius: 20px;
        }
        .med-id {
            font-size: 11px;
            color: var(--slate-light);
            font-weight: 500;
        }
        .qty-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .qty-label {
            font-size: 13px;
            color: var(--slate-mid);
            font-weight: 500;
            white-space: nowrap;
        }
        .qty-input {
            width: 70px;
            padding: 8px 10px;
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            font-size: 14px;
            text-align: center;
            color: var(--slate);
            outline: none;
            font-family: 'DM Sans', sans-serif;
        }
        .qty-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
        .med-btn-cart {
            width: 100%;
            justify-content: center;
            padding: 10px;
            font-size: 14px;
            border-radius: var(--r-sm);
        }
        .med-btn-detail {
            width: 100%;
            justify-content: center;
            padding: 9px;
            font-size: 13px;
            border-radius: var(--r-sm);
        }
        .search-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-bar .ms-input {
            flex: 1;
            min-width: 200px;
            border-radius: var(--r-sm);
        }
    </style>
</head>
<body>

<nav class="ms-nav">
    <div class="ms-nav-inner">
        <a class="ms-logo" href="/">
            <div class="ms-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <path d="M12 2l2 7h7l-5.6 4.1L17.4 20 12 15.9 6.6 20l2-6.9L3 9h7z"/>
                </svg>
            </div>
            <span class="ms-logo-text">Med<span>Store</span></span>
        </a>
        <div class="ms-nav-links">
            <a href="/medicines" class="ms-nav-link active">Medicines</a>
            <!--a href="/orders"    class="ms-nav-link">Orders</a-->
            <a href="/reviews"   class="ms-nav-link">Reviews</a>
            <a href="/cart?userId=USR001" class="ms-nav-link">Cart</a>
        </div>
        <div class="ms-nav-right">
            <a href="/" class="ms-btn ms-btn-ghost ms-btn-sm">← Home</a>
        </div>
    </div>
</nav>

<div class="ms-page">
    <div class="ms-page-header">
        <div>
            <div class="ms-page-title">Medicines</div>
            <div class="ms-page-subtitle">Browse and add medicines to your cart</div>
        </div>
    </div>

    <form action="/medicines" method="get" class="search-bar">
        <input type="text" name="search" class="ms-input"
               placeholder="Search by name or category..." th:value="${search}">
        <button type="submit" class="ms-btn ms-btn-primary">Search</button>
        <a href="/medicines" class="ms-btn ms-btn-ghost">Clear</a>
    </form>

    <div class="med-grid">
        <div th:each="med : ${medicines}">
            <div class="med-card">
                <div class="med-card-top">
                    <div class="med-card-top-name" th:text="${med.name}"></div>
                    <div class="med-card-top-badges">
                        <span class="med-badge-white" th:text="${med.category}"></span>
                        <span class="med-badge-white" th:text="${med.displayInfo}"></span>
                    </div>
                </div>
                <div class="med-card-body">
                    <div class="med-id" th:text="'ID: ' + ${med.medId}"></div>
                    <div class="med-price-row">
                        <span class="med-price" th:text="'Rs. ' + ${med.price}"></span>
                        <span class="med-stock-badge" th:text="${med.stock} + ' in stock'"></span>
                    </div>
                    <form th:action="@{/cart/add}" method="post" th:if="${med.stock > 0}"
                          style="display:flex; flex-direction:column; gap:10px;">
                        <input type="hidden" name="medId"     th:value="${med.medId}">
                        <input type="hidden" name="medName"   th:value="${med.name}">
                        <input type="hidden" name="unitPrice" th:value="${med.price}">
                        <input type="hidden" name="userId"    value="USR001">
                        <input type="hidden" name="redirect"  value="medicines">
                        <div class="qty-row">
                            <span class="qty-label">Quantity:</span>
                            <input type="number" name="quantity" value="1" min="1"
                                   th:max="${med.stock}" class="qty-input">
                        </div>
                        <button type="submit" class="ms-btn ms-btn-primary med-btn-cart">
                            Add to Cart
                        </button>
                    </form>
                    <div th:if="${med.stock == 0}">
                        <span class="ms-badge badge-red"
                              style="padding:8px 14px; width:100%; justify-content:center;">
                            Out of Stock
                        </span>
                    </div>
                    <a th:href="@{/medicines/view(id=${med.medId})}"
                       class="ms-btn ms-btn-outline med-btn-detail">
                        View Details
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="ms-footer">
    © 2026 <span>MedStore</span> — Licensed Online Pharmacy
</footer>
</body>
</html>
