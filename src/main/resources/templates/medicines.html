<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Medicines — MedStore</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/medstore.css}" href="medstore.css">
</head>
<body>

<nav class="ms-nav">
    <div class="ms-nav-inner">
        <a class="ms-logo" href="/">
            <div class="ms-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2l2 7h7l-5.6 4.1L17.4 20 12 15.9 6.6 20l2-6.9L3 9h7z"/></svg>
            </div>
            <span class="ms-logo-text">Med<span>Store</span></span>
        </a>
        <div class="ms-nav-links">
            <a href="/medicines" class="ms-nav-link active">Medicines</a>
            <a href="/orders"    class="ms-nav-link">Orders</a>
            <a href="/reviews"   class="ms-nav-link">Reviews</a>
            <a href="/admin"     class="ms-nav-link">Admin</a>
        </div>
        <div class="ms-nav-right">
            <a href="/cart" class="ms-btn ms-btn-outline ms-btn-sm">Cart</a>
            <a href="/login" class="ms-btn ms-btn-primary ms-btn-sm">Login</a>
        </div>
    </div>
</nav>

<div class="ms-page">
    <div class="ms-page-header">
        <div>
            <div class="ms-page-title">Medicines</div>
            <div class="ms-page-subtitle">Browse, search and manage the medicine catalogue</div>
        </div>
        <a href="/" class="ms-btn ms-btn-ghost ms-btn-sm">← Home</a>
    </div>

    <!-- Search -->
    <form action="/medicines" method="get" style="display:flex;gap:10px;margin-bottom:1.5rem;">
        <input type="text" name="search" class="ms-input" style="max-width:360px;"
               placeholder="Search by name or category…" th:value="${search}">
        <button class="ms-btn ms-btn-primary ms-btn-sm">Search</button>
        <a href="/medicines" class="ms-btn ms-btn-ghost ms-btn-sm">Clear</a>
    </form>

    <!-- Add Medicine -->
    <div class="ms-card" style="margin-bottom:1.5rem;">
        <div class="ms-card-header">
            <span class="ms-card-header-dot dot-teal"></span>
            Add New Medicine
        </div>
        <form action="/medicines/add" method="post" class="ms-inline-form">
            <div class="ms-form-group">
                <label class="ms-label">Name</label>
                <input type="text" name="name" class="ms-input" placeholder="Medicine name" required>
            </div>
            <div class="ms-form-group">
                <label class="ms-label">Category</label>
                <input type="text" name="category" class="ms-input" placeholder="e.g. Antibiotic" required>
            </div>
            <div class="ms-form-group">
                <label class="ms-label">Price (Rs.)</label>
                <input type="number" step="0.01" name="price" class="ms-input" placeholder="0.00" required>
            </div>
            <div class="ms-form-group">
                <label class="ms-label">Stock</label>
                <input type="number" name="stock" class="ms-input" placeholder="Qty" required>
            </div>
            <div class="ms-form-group" style="flex:0 0 auto;">
                <label class="ms-label">&nbsp;</label>
                <button class="ms-btn ms-btn-primary">Add Medicine</button>
            </div>
        </form>
    </div>

    <!-- Table -->
    <div class="ms-table-wrap">
        <table class="ms-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="med : ${medicines}">
                <td><span class="ms-badge badge-gray" th:text="${med.medId}"></span></td>
                <td><strong th:text="${med.name}"></strong></td>
                <td><span class="ms-badge badge-teal" th:text="${med.category}"></span></td>
                <td>Rs. <strong th:text="${med.price}"></strong></td>
                <td>
                    <span th:if="${med.stock > 10}" class="ms-badge badge-green" th:text="${med.stock} + ' in stock'"></span>
                    <span th:if="${med.stock <= 10 and med.stock > 0}" class="ms-badge badge-amber" th:text="${med.stock} + ' left'"></span>
                    <span th:if="${med.stock == 0}" class="ms-badge badge-red">Out of stock</span>
                </td>
                <td th:text="${med.displayInfo}"></td>
                <td>
                    <div class="ms-actions">
                        <a th:href="@{/medicines/edit(id=${med.medId})}" class="ms-btn ms-btn-warning ms-btn-sm">Edit</a>
                        <a th:href="@{/medicines/delete(id=${med.medId})}" class="ms-btn ms-btn-danger ms-btn-sm"
                           onclick="return confirm('Delete this medicine?')">Delete</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer class="ms-footer">
    © 2025 <span>MedStore</span> — Licensed Online Pharmacy
</footer>
</body>
</html>
