<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Medicines – MedStore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f5f7f2; }
        .med-card { border-radius: 12px; border: 1px solid #c7ddd6; }
        .med-card .card-header { background: #1a7a5e; color: #fff; border-radius: 12px 12px 0 0; }
        .btn-cart { background: #1a7a5e; color: #fff; width: 100%; }
        .btn-detail { border: 1px solid #1a7a5e; color: #1a7a5e; width: 100%; }
        .qty-input { width: 70px; text-align: center; }
    </style>
</head>
<body>

<nav class="navbar bg-white shadow-sm px-4">
    <a class="navbar-brand fw-bold" style="color:#1a7a5e;" href="/">★ MedStore</a>
    <div class="d-flex gap-3">
        <a class="nav-link" href="/medicines">Medicines</a>
        <a class="nav-link" href="/orders">Orders</a>
        <a class="nav-link" href="/reviews">Reviews</a>
        <a class="nav-link" href="/admin">Admin</a>
        <a class="nav-link" href="/cart">Cart</a>
        <a class="btn btn-sm text-white" style="background:#1a7a5e; border-radius:20px;" href="/login">Login</a>
    </div>
</nav>

<div class="container mt-4">
    <h2>Medicines</h2>
    <p class="text-muted">Browse and add medicines to your cart</p>

    <!-- Search -->
    <form action="/medicines" method="get" class="d-flex gap-2 mb-4">
        <input type="text" name="search" class="form-control"
               placeholder="Search by name or category..." th:value="${search}">
        <button type="submit" class="btn text-white" style="background:#1a7a5e;">Search</button>
        <a href="/medicines" class="btn btn-outline-secondary">Clear</a>
    </form>

    <!-- Cards -->
    <div class="row row-cols-1 row-cols-md-3 g-3">
        <div class="col" th:each="med : ${medicines}">
            <div class="card med-card h-100">
                <div class="card-header d-flex justify-content-between">
                    <span th:text="${med.name}"></span>
                    <small th:text="${med.medId}"></small>
                </div>
                <div class="card-body d-flex flex-column gap-2">
                    <div>
                        <span class="badge bg-secondary" th:text="${med.category}"></span>
                        <small class="text-muted ms-1" th:text="${med.displayInfo}"></small>
                    </div>
                    <div class="d-flex justify-content-between">
                        <strong th:text="'Rs. ' + ${med.price}"></strong>
                        <small th:text="${med.stock} + ' in stock'"></small>
                    </div>

                    <form th:action="@{/cart/add}" method="post" th:if="${med.stock > 0}">
                        <input type="hidden" name="medId"     th:value="${med.medId}">
                        <input type="hidden" name="medName"   th:value="${med.name}">
                        <input type="hidden" name="unitPrice" th:value="${med.price}">
                        <input type="hidden" name="userId"    value="USR001">
                        <input type="hidden" name="redirect"  value="medicines">
                        <div class="d-flex gap-2 align-items-center mb-2">
                            <small>Qty:</small>
                            <input type="number" name="quantity" value="1" min="1"
                                   th:max="${med.stock}" class="form-control qty-input">
                        </div>
                        <button type="submit" class="btn btn-cart mb-1">Add to Cart</button>
                    </form>
                    <button class="btn btn-secondary w-100 mb-1" disabled th:if="${med.stock == 0}">
                        Out of Stock
                    </button>

                    <a th:href="@{/medicines/view(id=${med.medId})}" class="btn btn-detail">
                        View Details
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
