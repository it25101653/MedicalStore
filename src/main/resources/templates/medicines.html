<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Medicines</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h3>Medicines</h3>
    <a href="/" class="btn btn-secondary btn-sm mb-3">Home</a>
    <form action="/medicines" method="get" class="d-flex mb-3">
        <input type="text" name="search" class="form-control me-2"
               placeholder="Search medicine..." th:value="${search}">
        <button class="btn btn-outline-primary">Search</button>
    </form>
    <div class="card mb-4">
        <div class="card-header bg-success text-white">Add New Medicine</div>
        <div class="card-body">
            <form action="/medicines/add" method="post" class="row g-2">
                <div class="col"><input type="text" name="name" class="form-control" placeholder="Name" required></div>
                <div class="col"><input type="text" name="category" class="form-control" placeholder="Category" required></div>
                <div class="col"><input type="number" step="0.01" name="price" class="form-control" placeholder="Price" required></div>
                <div class="col"><input type="number" name="stock" class="form-control" placeholder="Stock" required></div>
                <div class="col-auto"><button class="btn btn-success">Add</button></div>
            </form>
        </div>
    </div>
    <table class="table table-bordered table-hover">
        <thead class="table-success">
        <tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Type</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="med : ${medicines}">
            <td th:text="${med.medId}"></td>
            <td th:text="${med.name}"></td>
            <td th:text="${med.category}"></td>
            <td th:text="${med.price}"></td>
            <td th:text="${med.stock}"></td>
            <td th:text="${med.displayInfo}"></td>
            <td>
                <a th:href="@{/medicines/edit(id=${med.medId})}" class="btn btn-sm btn-warning">Edit</a>
                <a th:href="@{/medicines/delete(id=${med.medId})}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body></html>
