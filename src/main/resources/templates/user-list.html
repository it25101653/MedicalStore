<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users — MedStore</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/medstore.css}" href="medstore.css">
</head>
<body>

<nav class="ms-nav">
    <div class="ms-nav-inner">
        <a class="ms-logo" href="/">
            <div class="ms-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <path d="M12 2l2 7h7l-5.6 4.1L17.4 20 12 15.9 6.6 20l2-6.9L3 9h7z"/>
                </svg>
            </div>
            <span class="ms-logo-text">Med<span>Store</span></span>
        </a>
        <div class="ms-nav-links">
            <a href="/admin" class="ms-nav-link">Admin</a>
        </div>
        <div class="ms-nav-right">
            <a href="/admin" class="ms-btn ms-btn-ghost ms-btn-sm">← Admin Panel</a>
        </div>
    </div>
</nav>

<div class="ms-page">
    <div class="ms-page-header">
        <div>
            <div class="ms-page-title">All Users</div>
            <div class="ms-page-subtitle">
                Manage registered customer accounts —
                <strong th:text="${userCount}"></strong> users registered
            </div>
        </div>
        <a href="/admin" class="ms-btn ms-btn-ghost ms-btn-sm">← Admin Panel</a>
    </div>

    <div class="ms-table-wrap">
        <table class="ms-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td><span class="ms-badge badge-gray" th:text="${user.userId}"></span></td>
                <td>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div style="width:32px;height:32px;background:var(--teal-light);
                                    border-radius:50%;display:flex;align-items:center;
                                    justify-content:center;font-size:12px;font-weight:600;
                                    color:var(--teal-dark);flex-shrink:0;"
                             th:text="${#strings.substring(user.name,0,1).toUpperCase()}">U</div>
                        <strong th:text="${user.name}"></strong>
                    </div>
                </td>
                <td style="color:var(--slate-mid);" th:text="${user.email}"></td>
                <td>
                    <span th:if="${user.role == 'ADMIN'}"
                          class="ms-badge badge-teal">Admin</span>
                    <span th:if="${user.role == 'CUSTOMER'}"
                          class="ms-badge badge-blue">Customer</span>
                    <span th:if="${user.role != 'ADMIN' and user.role != 'CUSTOMER'}"
                          class="ms-badge badge-gray" th:text="${user.role}"></span>
                </td>
                <td>
                    <div class="ms-actions">
                        <a th:href="@{/users/profile(id=${user.userId})}"
                           class="ms-btn ms-btn-primary ms-btn-sm">View</a>
                        <a th:href="@{/users/edit(id=${user.userId})}"
                           class="ms-btn ms-btn-warning ms-btn-sm">Edit</a>
                        <a th:href="@{/users/delete(id=${user.userId})}"
                           class="ms-btn ms-btn-danger ms-btn-sm"
                           onclick="return confirm('Delete this user?')">Delete</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer class="ms-footer">
    © 2026 <span>MedStore</span> — Licensed Online Pharmacy
</footer>
</body>
</html>
