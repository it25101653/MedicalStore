<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit User — MedStore</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/medstore.css}" href="medstore.css">
</head>
<body>

<nav class="ms-nav">
    <div class="ms-nav-inner">
        <a class="ms-logo" href="/">
            <div class="ms-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2l2 7h7l-5.6 4.1L17.4 20 12 15.9 6.6 20l2-6.9L3 9h7z"/></svg>
            </div>
            <span class="ms-logo-text">Med<span>Store</span></span>
        </a>
        <div class="ms-nav-links">
            <a href="/users"  class="ms-nav-link active">Users</a>
            <a href="/admin"  class="ms-nav-link">Admin</a>
        </div>
    </div>
</nav>

<div class="ms-page-md">
    <div class="ms-page-header">
        <div>
            <div class="ms-page-title">Edit User</div>
            <div class="ms-page-subtitle">Update account information</div>
        </div>
        <a href="/users" class="ms-btn ms-btn-ghost ms-btn-sm">← All Users</a>
    </div>

    <div class="ms-card">
        <div class="ms-card-header">
            <span class="ms-card-header-dot dot-teal"></span>
            Account Details
        </div>

        <form action="/users/edit" method="post">
            <input type="hidden" name="userId" th:value="${user.userId}">

            <div class="ms-form-group">
                <label class="ms-label">Full Name</label>
                <input type="text" name="name" class="ms-input"
                       th:value="${user.name}" placeholder="Full name" required>
            </div>

            <div class="ms-form-group">
                <label class="ms-label">Email Address</label>
                <input type="email" name="email" class="ms-input"
                       th:value="${user.email}" placeholder="user@example.com" required>
            </div>

            <div style="display:flex;gap:10px;margin-top:1.5rem;">
                <button type="submit" class="ms-btn ms-btn-primary">Save Changes</button>
                <a href="/users" class="ms-btn ms-btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer class="ms-footer">
    © 2025 <span>MedStore</span> — Licensed Online Pharmacy
</footer>
</body>
</html>
