<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reviews — MedStore</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/medstore.css}" href="medstore.css">

    <style>
        .ms-star-rating {
            display: flex;
            flex-direction: row-reverse;
            gap: 4px;
        }
        .ms-star-rating input[type="radio"] {
            display: none;
        }
        .ms-star-rating label {
            font-size: 1.8rem;
            color: #ccc;
            cursor: pointer;
            transition: color .15s;
        }
        .ms-star-rating input[type="radio"]:checked ~ label,
        .ms-star-rating label:hover,
        .ms-star-rating label:hover ~ label {
            color: #f0a500;
        }
    </style>
</head>
<body>

<nav class="ms-nav">
    <div class="ms-nav-inner">
        <a class="ms-logo" href="/">
            <div class="ms-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2l2 7h7l-5.6 4.1L17.4 20 12 15.9 6.6 20l2-6.9L3 9h7z"/></svg>
            </div>
            <span class="ms-logo-text">Med<span>Store</span></span>
        </a>
        <div class="ms-nav-links">
            <a href="/medicines" class="ms-nav-link">Medicines</a>
            <a href="/orders"    class="ms-nav-link">Orders</a>
            <a href="/reviews"   class="ms-nav-link active">Reviews</a>
            <a href="/admin"     class="ms-nav-link">Admin</a>
        </div>
        <div class="ms-nav-right">
            <a href="/" class="ms-btn ms-btn-ghost ms-btn-sm">← Home</a>
        </div>
    </div>
</nav>

<div class="ms-page">
    <div class="ms-page-header">
        <div>
            <div class="ms-page-title">Reviews</div>
            <div class="ms-page-subtitle">Customer feedback and medicine ratings</div>
        </div>
    </div>


    <div style="margin-bottom:1.5rem;display:flex;align-items:center;gap:12px;">
        <label class="ms-label">Filter by Rating:</label>
        <select class="ms-select" style="width:180px;"
                onchange="window.location.href='/reviews?rating=' + (this.value || '')">
            <option value="" th:selected="${rating == null}">All Ratings</option>
            <option value="5" th:selected="${rating == 5}">★★★★★ 5 Stars</option>
            <option value="4" th:selected="${rating == 4}">★★★★☆ 4 Stars</option>
            <option value="3" th:selected="${rating == 3}">★★★☆☆ 3 Stars</option>
            <option value="2" th:selected="${rating == 2}">★★☆☆☆ 2 Stars</option>
            <option value="1" th:selected="${rating == 1}">★☆☆☆☆ 1 Star</option>
        </select>
    </div>

    <!-- Submit Review -->
    <div class="ms-card" style="margin-bottom:1.75rem;">
        <div class="ms-card-header">
            <span class="ms-card-header-dot dot-blue"></span>
            Submit a Review
        </div>
        <form action="/reviews/add" method="post" class="ms-inline-form">
            <div class="ms-form-group">
                <label class="ms-label">Your Name</label>
                <input type="text" name="userName" class="ms-input" placeholder="Your Name" required>
            </div>
            <div class ="ms-form-group">
                <label class="ms-label">Your Email</label>
                <input type="email" name="userEmails" class="ms-input" placeholder="Your Email" required>
            </div>
            <div class="ms-form-group">
                <label class="ms-label">Medicine ID</label>
                <input type="text" name="medId" class="ms-input" placeholder="Med ID" required>
            </div>
            <div class="ms-form-group" style="flex:0 0 150px;">
                <label class="ms-label">Rating</label>
                <div class="ms-star-rating">
                    <input type="radio" id="star5" name="rating" value="5">
                    <label for="star5" title="5">★</label>
                    <input type="radio" id="star4" name="rating" value="4">
                    <label for="star4" title="4">★</label>
                    <input type="radio" id="star3" name="rating" value="3" checked>
                    <label for="star3" title="3">★</label>
                    <input type="radio" id="star2" name="rating" value="2">
                    <label for="star2" title="2">★</label>
                    <input type="radio" id="star1" name="rating" value="1">
                    <label for="star1" title="1">★</label>
                </div>
            </div>
            <div class="ms-form-group" style="flex:2;">
                <label class="ms-label">Comment</label>
                <input type="text" name="comment" class="ms-input" placeholder="Share your experience…" required>
            </div>
            <div class="ms-form-group" style="flex:0 0 auto;">
                <label class="ms-label">&nbsp;</label>
                <button class="ms-btn ms-btn-primary">Submit Review</button>
            </div>
        </form>
    </div>

    <!-- Review Cards -->
    <div style="display:flex;flex-direction:column;gap:12px;">
        <div th:each="review : ${reviews}" class="ms-review-card">
            <div class="ms-review-meta">
                <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                    <div style="width:36px;height:36px;background:var(--teal-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--teal-dark);"
                         th:text="${#strings.substring(review.userName,0,2).toUpperCase()}">U</div>
                    <div>
                        <div style="font-size:14px;font-weight:600;color:var(--slate);" th:text="${review.userName}"></div>
                        <div style="font-size:12px;color:var(--slate-light);" th:text="${review.userEmails}"></div>
                        <div style="font-size:12px;color:var(--slate-light);">Medicine ID: <span th:text="${review.medId}"></span></div>
                    </div>
                    <span class="ms-badge badge-teal ms-badge" th:text="${review.displayLabel}"></span>
                </div>
                <div style="display:flex;align-items:center;gap:6px;">
          <span class="ms-stars">
            <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span>
          </span>
                    <span style="font-size:13px;font-weight:600;color:var(--slate);" th:text="${review.rating} + '/5'"></span>
                </div>
            </div>

            <p class="ms-review-comment" th:text="${review.comment}"></p>
            <p style="font-size:11px;color:var(--slate-light);margin-top:4px;" th:text="'Posted on: ' + ${review.date}"></p>


        </div>
    </div>
</div>

<footer class="ms-footer">
    © 2025 <span>MedStore</span> — Licensed Online Pharmacy
</footer>
</body>
</html>
