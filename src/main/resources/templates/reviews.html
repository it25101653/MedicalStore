<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reviews — MedStore</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/medstore.css}" href="medstore.css">
</head>
<body>

<nav class="ms-nav">
    <div class="ms-nav-inner">
        <a class="ms-logo" href="/">
            <div class="ms-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2l2 7h7l-5.6 4.1L17.4 20 12 15.9 6.6 20l2-6.9L3 9h7z"/></svg>
            </div>
            <span class="ms-logo-text">Med<span>Store</span></span>
        </a>
        <div class="ms-nav-links">
            <a href="/medicines" class="ms-nav-link">Medicines</a>
            <a href="/orders"    class="ms-nav-link">Orders</a>
            <a href="/reviews"   class="ms-nav-link active">Reviews</a>
            <a href="/admin"     class="ms-nav-link">Admin</a>
        </div>
        <div class="ms-nav-right">
            <a href="/" class="ms-btn ms-btn-ghost ms-btn-sm">← Home</a>
        </div>
    </div>
</nav>

<div class="ms-page">
    <div class="ms-page-header">
        <div>
            <div class="ms-page-title">Reviews</div>
            <div class="ms-page-subtitle">Customer feedback and medicine ratings</div>
        </div>
    </div>

    <!-- Submit Review -->
    <div class="ms-card" style="margin-bottom:1.75rem;">
        <div class="ms-card-header">
            <span class="ms-card-header-dot dot-blue"></span>
            Submit a Review
        </div>
        <form action="/reviews/add" method="post" class="ms-inline-form">
            <div class="ms-form-group">
                <label class="ms-label">User ID</label>
                <input type="text" name="userId" class="ms-input" placeholder="User ID" required>
            </div>
            <div class="ms-form-group">
                <label class="ms-label">Medicine ID</label>
                <input type="text" name="medId" class="ms-input" placeholder="Med ID" required>
            </div>
            <div class="ms-form-group" style="flex:0 0 120px;">
                <label class="ms-label">Rating</label>
                <select name="rating" class="ms-select">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option selected>5</option>
                </select>
            </div>
            <div class="ms-form-group" style="flex:2;">
                <label class="ms-label">Comment</label>
                <input type="text" name="comment" class="ms-input" placeholder="Share your experience…" required>
            </div>
            <div class="ms-form-group" style="flex:0 0 auto;">
                <label class="ms-label">&nbsp;</label>
                <button class="ms-btn ms-btn-primary">Submit Review</button>
            </div>
        </form>
    </div>

    <!-- Review Cards -->
    <div style="display:flex;flex-direction:column;gap:12px;">
        <div th:each="review : ${reviews}" class="ms-review-card">
            <div class="ms-review-meta">
                <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                    <div style="width:36px;height:36px;background:var(--teal-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--teal-dark);"
                         th:text="${#strings.substring(review.userId,0,2).toUpperCase()}">U</div>
                    <div>
                        <div style="font-size:14px;font-weight:600;color:var(--slate);" th:text="'User ' + ${review.userId}"></div>
                        <div style="font-size:12px;color:var(--slate-light);">Medicine ID: <span th:text="${review.medId}"></span></div>
                    </div>
                    <span class="ms-badge badge-teal ms-badge" th:text="${review.displayLabel}"></span>
                </div>
                <div style="display:flex;align-items:center;gap:6px;">
          <span class="ms-stars">
            <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span>
          </span>
                    <span style="font-size:13px;font-weight:600;color:var(--slate);" th:text="${review.rating} + '/5'"></span>
                </div>
            </div>

            <p class="ms-review-comment" th:text="${review.comment}"></p>

            <div class="ms-review-edit">
                <form action="/reviews/edit" method="post" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <input type="hidden" name="reviewId" th:value="${review.reviewId}">
                    <input type="number" name="rating" class="ms-input" style="width:72px;"
                           th:value="${review.rating}" min="1" max="5">
                    <input type="text" name="comment" class="ms-input" style="flex:1;min-width:180px;"
                           th:value="${review.comment}" placeholder="Updated comment…">
                    <button class="ms-btn ms-btn-outline ms-btn-sm">Update</button>
                </form>
                <a th:href="@{/reviews/delete(id=${review.reviewId})}"
                   class="ms-btn ms-btn-danger ms-btn-sm"
                   onclick="return confirm('Delete this review?')">Delete</a>
            </div>
        </div>
    </div>
</div>

<footer class="ms-footer">
    © 2025 <span>MedStore</span> — Licensed Online Pharmacy
</footer>
</body>
</html>
