<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Reviews</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h3>Reviews</h3>
    <a href="/" class="btn btn-secondary btn-sm mb-3">Home</a>
    <div class="card mb-4">
        <div class="card-header bg-info text-white">Submit a Review</div>
        <div class="card-body">
            <form action="/reviews/add" method="post" class="row g-2">
                <div class="col"><input type="text" name="userId" class="form-control" placeholder="User ID" required></div>
                <div class="col"><input type="text" name="medId" class="form-control" placeholder="Medicine ID" required></div>
                <div class="col">
                    <select name="rating" class="form-select">
                        <option>1</option><option>2</option><option>3</option>
                        <option>4</option><option selected>5</option>
                    </select>
                </div>
                <div class="col"><input type="text" name="comment" class="form-control" placeholder="Comment" required></div>
                <div class="col-auto"><button class="btn btn-info text-white">Submit</button></div>
            </form>
        </div>
    </div>
    <div th:each="review : ${reviews}" class="card mb-2">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
          <span>
            <strong th:text="${review.userId}"></strong> on
            <em th:text="${review.medId}"></em>
            <span class="badge bg-success ms-1" th:text="${review.displayLabel}"></span>
          </span>
                <strong><span th:text="${review.rating}"></span>/5</strong>
            </div>
            <p class="mt-1 mb-2" th:text="${review.comment}"></p>
            <form action="/reviews/edit" method="post" class="d-inline">
                <input type="hidden" name="reviewId" th:value="${review.reviewId}">
                <input type="number" name="rating" class="form-control form-control-sm d-inline"
                       style="width:60px" th:value="${review.rating}">
                <input type="text" name="comment" class="form-control form-control-sm d-inline"
                       style="width:200px" th:value="${review.comment}">
                <button class="btn btn-sm btn-outline-primary">Update</button>
            </form>
            <a th:href="@{/reviews/delete(id=${review.reviewId})}"
               class="btn btn-sm btn-outline-danger">Delete</a>
        </div>
    </div>
</div>
</body></html>
