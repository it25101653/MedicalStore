<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Medicine — MedStore</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/medstore.css}" href="medstore.css">
</head>
<body>

<nav class="ms-nav">
    <div class="ms-nav-inner">
        <a class="ms-logo" href="/">
            <div class="ms-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <path d="M12 2l2 7h7l-5.6 4.1L17.4 20 12 15.9 6.6 20l2-6.9L3 9h7z"/>
                </svg>
            </div>
            <span class="ms-logo-text">Med<span>Store</span></span>
        </a>
        <div class="ms-nav-links">
            <a href="/medicines" class="ms-nav-link active">Medicines</a>
            <a href="/orders"    class="ms-nav-link">Orders</a>
            <a href="/admin"     class="ms-nav-link">Admin</a>
        </div>
        <div class="ms-nav-right">
            <a href="/medicines" class="ms-btn ms-btn-ghost ms-btn-sm">← Medicines</a>
        </div>
    </div>
</nav>

<div class="ms-page-md">
    <div class="ms-page-header">
        <div>
            <div class="ms-page-title">Edit Medicine</div>
            <div class="ms-page-subtitle" th:text="'Editing: ' + ${med.name}"></div>
        </div>
        <span class="ms-badge badge-gray" th:text="${med.medId}"></span>
    </div>

    <div class="ms-card">
        <div class="ms-card-header">
            <span class="ms-card-header-dot dot-amber"></span>
            Medicine Details
        </div>

        <div class="ms-alert ms-alert-danger" style="background:var(--amber-soft);color:#78350F;border-color:#FDE68A;">
            ⚠️ Admin action — changes are visible to all users immediately.
        </div>

        <form action="/medicines/edit" method="post">
            <input type="hidden" name="medId" th:value="${med.medId}">

            <div class="ms-form-group">
                <label class="ms-label">Price (Rs.)</label>
                <input type="number" step="0.01" name="price"
                       class="ms-input" th:value="${med.price}" required>
            </div>

            <div class="ms-form-group">
                <label class="ms-label">Stock (units)</label>
                <input type="number" name="stock"
                       class="ms-input" th:value="${med.stock}" required>
            </div>

            <div class="ms-form-group">
                <label class="ms-label">Description</label>
                <textarea name="description" class="ms-input" rows="4"
                          style="height:auto;resize:vertical;"
                          th:text="${med.description}"></textarea>
                <div style="font-size:12px;color:var(--slate-light);margin-top:4px;">
                    Shown on the medicine detail page.
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:1.5rem;">
                <button type="submit" class="ms-btn ms-btn-primary">Save Changes</button>
                <a href="/medicines" class="ms-btn ms-btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer class="ms-footer">
    © 2026 <span>MedStore</span> — Licensed Online Pharmacy
</footer>
</body>
</html>
