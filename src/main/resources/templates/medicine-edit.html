<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Edit Medicine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:400px">
    <h3>Edit Medicine</h3>
    <form action="/medicines/edit" method="post">
        <input type="hidden" name="medId" th:value="${med.medId}">
        <div class="mb-3"><label>Price</label>
            <input type="number" step="0.01" name="price" class="form-control" th:value="${med.price}"></div>
        <div class="mb-3"><label>Stock</label>
            <input type="number" name="stock" class="form-control" th:value="${med.stock}"></div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="/medicines" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body></html>
