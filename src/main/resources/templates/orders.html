<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h3>Orders</h3>
    <a href="/" class="btn btn-secondary btn-sm mb-3">Home</a>
    <div class="card mb-4">
        <div class="card-header bg-warning">Place New Order</div>
        <div class="card-body">
            <form action="/orders/place" method="post" class="row g-2">
                <div class="col"><input type="text" name="userId" class="form-control" placeholder="User ID" required></div>
                <div class="col"><input type="text" name="medId" class="form-control" placeholder="Medicine ID" required></div>
                <div class="col"><input type="text" name="medName" class="form-control" placeholder="Medicine Name" required></div>
                <div class="col"><input type="number" name="quantity" class="form-control" placeholder="Qty" required></div>
                <div class="col"><input type="number" step="0.01" name="unitPrice" class="form-control" placeholder="Unit Price" required></div>
                <div class="col-auto"><button class="btn btn-warning">Place Order</button></div>
            </form>
        </div>
    </div>
    <table class="table table-bordered">
        <thead class="table-warning">
        <tr><th>Order ID</th><th>User</th><th>Medicine</th><th>Qty</th><th>Total</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.orderId}"></td>
            <td th:text="${order.userId}"></td>
            <td th:text="${order.medName}"></td>
            <td th:text="${order.quantity}"></td>
            <td th:text="${order.totalPrice}"></td>
            <td th:text="${order.status}"></td>
            <td>
                <form action="/orders/status" method="post" class="d-inline">
                    <input type="hidden" name="orderId" th:value="${order.orderId}">
                    <select name="status" class="form-select form-select-sm d-inline" style="width:130px">
                        <option>PENDING</option>
                        <option>CONFIRMED</option>
                        <option>DELIVERED</option>
                    </select>
                    <button class="btn btn-sm btn-primary">Update</button>
                </form>
                <a th:href="@{/orders/delete(id=${order.orderId})}" class="btn btn-sm btn-danger">Cancel</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body></html>
