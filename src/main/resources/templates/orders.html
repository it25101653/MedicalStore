<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Orders — MedStore</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/medstore.css}" href="medstore.css">
</head>
<body>

<nav class="ms-nav">
    <div class="ms-nav-inner">
        <a class="ms-logo" href="/">
            <div class="ms-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <path d="M12 2l2 7h7l-5.6 4.1L17.4 20 12 15.9 6.6 20l2-6.9L3 9h7z"/>
                </svg>
            </div>
            <span class="ms-logo-text">Med<span>Store</span></span>
        </a>
        <div class="ms-nav-links">
            <a href="/admin" class="ms-nav-link">Admin</a>
        </div>
        <div class="ms-nav-right">
            <a href="/admin" class="ms-btn ms-btn-ghost ms-btn-sm">← Admin Panel</a>
        </div>
    </div>
</nav>

<div class="ms-page">
    <div class="ms-page-header">
        <div>
            <div class="ms-page-title">Orders</div>
            <div class="ms-page-subtitle">Manage and update all customer orders</div>
        </div>
    </div>

    <!-- Orders Table -->
    <div class="ms-table-wrap">
        <table class="ms-table">
            <thead>
            <tr>
                <th>Order ID</th>
                <th>User</th>
                <th>Medicine</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td><span class="ms-badge badge-gray" th:text="'#' + ${order.orderId}"></span></td>
                <td th:text="${order.userId}"></td>
                <td><strong th:text="${order.medName}"></strong></td>
                <td th:text="${order.quantity}"></td>
                <td>Rs. <strong th:text="${order.totalPrice}"></strong></td>
                <td>
                    <span th:if="${order.status == 'PENDING'}"   class="ms-badge badge-amber">Pending</span>
                    <span th:if="${order.status == 'CONFIRMED'}" class="ms-badge badge-blue">Confirmed</span>
                    <span th:if="${order.status == 'DELIVERED'}" class="ms-badge badge-green">Delivered</span>
                    <span th:if="${order.status != 'PENDING' and order.status != 'CONFIRMED' and order.status != 'DELIVERED'}"
                          class="ms-badge badge-gray" th:text="${order.status}"></span>
                </td>
                <td>
                    <div class="ms-actions">
                        <form action="/orders/status" method="post"
                              style="display:inline-flex;gap:6px;align-items:center;">
                            <input type="hidden" name="orderId" th:value="${order.orderId}">
                            <select name="status" class="ms-select"
                                    style="width:130px;padding:6px 10px;font-size:13px;">
                                <option>PENDING</option>
                                <option>CONFIRMED</option>
                                <option>DELIVERED</option>
                            </select>
                            <button class="ms-btn ms-btn-primary ms-btn-sm">Update</button>
                        </form>
                        <a th:href="@{/orders/delete(id=${order.orderId})}"
                           class="ms-btn ms-btn-danger ms-btn-sm"
                           onclick="return confirm('Cancel this order?')">Cancel</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer class="ms-footer">
    © 2026 <span>MedStore</span> — Licensed Online Pharmacy
</footer>
</body>
</html>
