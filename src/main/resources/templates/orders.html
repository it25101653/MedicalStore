<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h3>Orders</h3>
    <a href="/medicines" class="btn btn-warning mb-3">
    Place a New Order
</a>
    <a href="/" class="btn btn-success btn-sm mb-3">Home</a>
    
    </div>
    <table class="table table-bordered table-hover shadow rounded">
        <thead class="table-warning">
        <tr><th>Order ID</th><th>User</th><th>Medicine</th><th>Qty</th><th>Total</th><th>Status</th><th>Cancel</th></tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(orders)}">
    <td colspan="7" class="text-center text-danger">
        No orders available
    </td>
</tr>
        <tr th:each="order : ${orders}">
            <td th:text="${order.orderId}"></td>
            <td th:text="${order.userId}"></td>
            <td th:text="${order.medName}"></td>
            <td th:text="${order.quantity}"></td>
            <td th:text="${order.totalPrice}"></td>
            <td th:text="${order.status}"></td>
            <td>
                
                <a th:href="@{/orders/delete(id=${order.orderId})}" class="btn btn-sm btn-danger">Cancel</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body></html>
