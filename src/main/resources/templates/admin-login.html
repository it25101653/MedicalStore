<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Login</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/medstore.css}"
          href="medstore.css">

</head>

<body style="min-height:100vh;
             display:flex;
             flex-direction:column;">

<nav class="ms-nav">

    <div class="ms-nav-inner">

        <a class="ms-logo" href="/">

            <div class="ms-logo-icon">

                <svg viewBox="0 0 24 24">
                    <path d="M12 2l2 7h7l-5.6 4.1L17.4 20 12 15.9 6.6 20l2-6.9L3 9h7z"/>
                </svg>

            </div>

            <span class="ms-logo-text">
                Med<span>Store</span>
            </span>

        </a>

    </div>

</nav>

<div class="ms-page"
     style="flex:1;
            width:100%;
            max-width:680px;
            margin:0 auto;
            padding-top:120px;">

    <div class="ms-card">

        <div class="ms-page-header"
             style="margin-bottom:1.5rem;">

            <div>

                <div class="ms-page-title">
                    Admin Login
                </div>

                <div class="ms-page-subtitle">
                    Sign in to access the admin dashboard
                </div>

            </div>

        </div>

        <form action="/admin/login"
              method="post">

            <div class="ms-form-group"
                 style="margin-bottom:1rem;">

                <label class="ms-label">
                    Email Address
                </label>

                <input type="email"
                       name="email"
                       class="ms-input"
                       placeholder="admin@medstore.com"
                       required>

            </div>

            <div class="ms-form-group"
                 style="margin-bottom:1.5rem;">

                <label class="ms-label">
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="ms-input"
                       placeholder="Enter password"
                       required>

            </div>

            <button class="ms-btn ms-btn-primary"
                    style="width:100%;
                           display:flex;
                           justify-content:center;">

                Login

            </button>

        </form>

    </div>

</div>

<footer class="ms-footer">
    © 2025 <span>MedStore</span> — Admin Access
</footer>

</body>
</html>
