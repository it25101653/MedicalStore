<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Admin Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h3>Admin Dashboard</h3>
    <div class="row mb-4">
        <div class="col"><a href="/users"     class="btn btn-outline-primary w-100">Manage Users</a></div>
        <div class="col"><a href="/medicines" class="btn btn-outline-success w-100">Manage Medicines</a></div>
        <div class="col"><a href="/orders"    class="btn btn-outline-warning w-100">Manage Orders</a></div>
        <div class="col"><a href="/reviews"   class="btn btn-outline-info w-100">Manage Reviews</a></div>
    </div>
    <div class="card mb-4">
        <div class="card-header bg-secondary text-white">Register New Admin</div>
        <div class="card-body">
            <form action="/admin/register" method="post" class="row g-2">
                <div class="col"><input type="text" name="name" class="form-control" placeholder="Name" required></div>
                <div class="col"><input type="email" name="email" class="form-control" placeholder="Email" required></div>
                <div class="col"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
                <div class="col">
                    <select name="level" class="form-select">
                        <option value="ADMIN">Admin</option>
                        <option value="SUPER">Super Admin</option>
                    </select>
                </div>
                <div class="col-auto"><button class="btn btn-secondary">Add Admin</button></div>
            </form>
        </div>
    </div>
    <table class="table table-bordered">
        <thead class="table-secondary">
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Level</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="admin : ${admins}">
            <td th:text="${admin.adminId}"></td>
            <td th:text="${admin.name}"></td>
            <td th:text="${admin.email}"></td>
            <td th:text="${admin.level}"></td>
            <td><a th:href="@{/admin/delete(id=${admin.adminId})}" class="btn btn-sm btn-danger">Delete</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body></html>
