<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Cart</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h3>Shopping Cart</h3>

    <a href="/" class="btn btn-secondary btn-sm mb-3">Home</a>

    <div class="card mb-4">

        <div class="card-header bg-danger text-white">
            Add Item to Cart
        </div>

        <div class="card-body">

            <form action="/cart/add" method="post" class="row g-2">

                <div class="col">
                    <input type="text"
                           name="userId"
                           class="form-control"
                           placeholder="User ID"
                           required>
                </div>

                <div class="col">
                    <input type="text"
                           name="medId"
                           class="form-control"
                           placeholder="Medicine ID"
                           required>
                </div>

                <div class="col">
                    <input type="text"
                           name="medName"
                           class="form-control"
                           placeholder="Medicine Name"
                           required>
                </div>

                <div class="col">
                    <input type="number"
                           name="quantity"
                           class="form-control"
                           placeholder="Qty"
                           min="1"
                           required>
                </div>

                <div class="col">
                    <input type="number"
                           step="0.01"
                           name="unitPrice"
                           class="form-control"
                           placeholder="Price"
                           min="0"
                           required>
                </div>

                <div class="col-auto">
                    <button class="btn btn-danger">
                        Add to Cart
                    </button>
                </div>

            </form>

        </div>
    </div>

    <div th:if="${cart.items.isEmpty()}" class="alert alert-warning">
        Your cart is empty.
    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-danger">
        <tr>
            <th>Medicine</th>
            <th>Qty</th>
            <th>Unit Price</th>
            <th>Item Total</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="item : ${cart.items}">

            <td th:text="${item.medName}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.unitPrice}"></td>
            <td th:text="${item.itemTotal}"></td>

            <td>
                <a th:href="@{/cart/remove(userId=${userId},medId=${item.medId})}"
                   class="btn btn-sm btn-danger">
                    Remove
                </a>
            </td>

        </tr>

        </tbody>

    </table>

    <h5 class="text-end text-danger">
        Cart Total:
        Rs. <strong th:text="${cart.totalPrice}"></strong>
    </h5>

</div>

</body>
</html>
