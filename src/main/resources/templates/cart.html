<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cart — MedStore</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/medstore.css}" href="medstore.css">
</head>
<body>

<nav class="ms-nav">
    <div class="ms-nav-inner">
        <a class="ms-logo" href="/">
            <div class="ms-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2l2 7h7l-5.6 4.1L17.4 20 12 15.9 6.6 20l2-6.9L3 9h7z"/></svg>
            </div>
            <span class="ms-logo-text">Med<span>Store</span></span>
        </a>
        <div class="ms-nav-links">
            <a href="/medicines" class="ms-nav-link">Medicines</a>
            <a href="/orders"    class="ms-nav-link">Orders</a>
            <a href="/reviews"   class="ms-nav-link">Reviews</a>
        </div>
        <div class="ms-nav-right">
            <a href="/" class="ms-btn ms-btn-ghost ms-btn-sm">← Home</a>
        </div>
    </div>
</nav>

<div class="ms-page">
    <div class="ms-page-header">
        <div>
            <div class="ms-page-title">Shopping Cart</div>
            <div class="ms-page-subtitle">Review your items before checkout</div>
        </div>
    </div>

    <!-- Add Item -->
    <div class="ms-card" style="margin-bottom:1.5rem;">
        <div class="ms-card-header">
            <span class="ms-card-header-dot dot-red"></span>
            Add Item to Cart
        </div>
        <form action="/cart/add" method="post" class="ms-inline-form">
            <div class="ms-form-group">
                <label class="ms-label">User ID</label>
                <input type="text" name="userId" class="ms-input" placeholder="User ID" required>
            </div>
            <div class="ms-form-group">
                <label class="ms-label">Medicine ID</label>
                <input type="text" name="medId" class="ms-input" placeholder="Med ID" required>
            </div>
            <div class="ms-form-group">
                <label class="ms-label">Medicine Name</label>
                <input type="text" name="medName" class="ms-input" placeholder="Name" required>
            </div>
            <div class="ms-form-group">
                <label class="ms-label">Quantity</label>
                <input type="number" name="quantity" class="ms-input" placeholder="Qty" required>
            </div>
            <div class="ms-form-group">
                <label class="ms-label">Unit Price</label>
                <input type="number" step="0.01" name="unitPrice" class="ms-input" placeholder="0.00" required>
            </div>
            <div class="ms-form-group" style="flex:0 0 auto;">
                <label class="ms-label">&nbsp;</label>
                <button class="ms-btn ms-btn-primary">Add to Cart</button>
            </div>
        </form>
    </div>

    <!-- Cart Items Table -->
    <div class="ms-table-wrap">
        <table class="ms-table">
            <thead>
            <tr>
                <th>Medicine</th>
                <th>Quantity</th>
                <th>Unit Price</th>
                <th>Item Total</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cart.items}">
                <td><strong th:text="${item.medName}"></strong></td>
                <td th:text="${item.quantity}"></td>
                <td>Rs. <span th:text="${item.unitPrice}"></span></td>
                <td>Rs. <strong th:text="${item.itemTotal}"></strong></td>
                <td>
                    <a th:href="@{/cart/remove(userId=${userId},medId=${item.medId})}"
                       class="ms-btn ms-btn-danger ms-btn-sm"
                       onclick="return confirm('Remove this item?')">Remove</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Cart Total -->
    <div class="ms-cart-total">
        <span class="ms-cart-total-label">Cart Total</span>
        <span class="ms-cart-total-value">Rs. <span th:text="${cart.totalPrice}"></span></span>
        <a href="/orders" class="ms-btn ms-btn-primary" style="margin-left:1rem;">Proceed to Order →</a>
    </div>
</div>

<footer class="ms-footer">
    © 2025 <span>MedStore</span> — Licensed Online Pharmacy
</footer>
</body>
</html>
